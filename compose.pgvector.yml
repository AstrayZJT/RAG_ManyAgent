services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: insightflow-pgvector
    environment:
      POSTGRES_DB: ${DB_NAME:-agentdemo}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - insightflow-pgvector-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-agentdemo}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  insightflow-pgvector-data:
