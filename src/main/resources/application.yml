spring:
  application:
    name: insightflow
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
server:
  port: 8080

langchain4j:
  open-ai:
    chat-model:
      base-url: ${OPENAI_BASE_URL:${LANGCHAIN4J_OPEN_AI_CHAT_MODEL_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
      api-key: ${OPENAI_API_KEY:${LANGCHAIN4J_OPEN_AI_CHAT_MODEL_API_KEY:}}
      model-name: ${OPENAI_MODEL_NAME:${LANGCHAIN4J_OPEN_AI_CHAT_MODEL_MODEL_NAME:qwen3.7-plus}}
      temperature: ${OPENAI_TEMPERATURE:0.2}
      max-completion-tokens: ${OPENAI_MAX_COMPLETION_TOKENS:2400}
      timeout: ${OPENAI_TIMEOUT:PT90S}
      max-retries: ${OPENAI_MAX_RETRIES:2}
      strict-json-schema: ${OPENAI_STRICT_JSON_SCHEMA:true}
      log-requests: ${OPENAI_LOG_REQUESTS:false}
      log-responses: ${OPENAI_LOG_RESPONSES:false}

agent:
  search:
    max-results: ${AGENT_SEARCH_MAX_RESULTS:5}
    max-external-results-per-query: ${AGENT_MAX_EXTERNAL_RESULTS_PER_QUERY:4}
    max-external-pages: ${AGENT_MAX_EXTERNAL_PAGES:8}
    timeout-ms: ${AGENT_SEARCH_TIMEOUT_MS:15000}
    user-agent: ${AGENT_SEARCH_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36 InsightFlow/0.1}
  webpage:
    max-characters: ${AGENT_WEBPAGE_MAX_CHARACTERS:8000}
    min-characters: ${AGENT_WEBPAGE_MIN_CHARACTERS:240}

rag:
  knowledge-path: ${RAG_KNOWLEDGE_PATH:knowledge}
  chunking:
    max-length: ${RAG_CHUNK_MAX_LENGTH:800}
    overlap: ${RAG_CHUNK_OVERLAP:120}
  embedding:
    enabled: ${RAG_EMBEDDING_ENABLED:false}
    base-url: ${RAG_EMBEDDING_BASE_URL:${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
    api-key: ${RAG_EMBEDDING_API_KEY:${OPENAI_API_KEY:}}
    model-name: ${RAG_EMBEDDING_MODEL_NAME:text-embedding-v4}
    dimension: ${RAG_EMBEDDING_DIMENSION:1024}
    timeout: ${RAG_EMBEDDING_TIMEOUT:PT60S}
    max-retries: ${RAG_EMBEDDING_MAX_RETRIES:2}
    max-results: ${RAG_EMBEDDING_MAX_RESULTS:20}
    min-score: ${RAG_EMBEDDING_MIN_SCORE:0.55}
  retrieval:
    keyword-weight: ${RAG_KEYWORD_WEIGHT:0.45}
    vector-weight: ${RAG_VECTOR_WEIGHT:0.55}
    rrf-k: ${RAG_RRF_K:60}
    candidate-multiplier: ${RAG_CANDIDATE_MULTIPLIER:4}
  rerank:
    enabled: ${RAG_RERANK_ENABLED:false}
    base-url: ${RAG_RERANK_BASE_URL:https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank}
    api-key: ${RAG_RERANK_API_KEY:${OPENAI_API_KEY:}}
    model-name: ${RAG_RERANK_MODEL_NAME:gte-rerank-v2}
    candidate-count: ${RAG_RERANK_CANDIDATE_COUNT:20}
    top-n: ${RAG_RERANK_TOP_N:5}
    timeout: ${RAG_RERANK_TIMEOUT:PT60S}
  pgvector:
    host: ${RAG_PGVECTOR_HOST:localhost}
    port: ${RAG_PGVECTOR_PORT:5432}
    database: ${RAG_PGVECTOR_DATABASE:agentdemo}
    username: ${RAG_PGVECTOR_USERNAME:postgres}
    password: ${RAG_PGVECTOR_PASSWORD:}
    table: ${RAG_PGVECTOR_TABLE:knowledge_embeddings}
    use-index: ${RAG_PGVECTOR_USE_INDEX:false}
    index-list-size: ${RAG_PGVECTOR_INDEX_LIST_SIZE:100}

infrastructure:
  redis:
    enabled: ${INFRA_REDIS_ENABLED:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  minio:
    enabled: ${INFRA_MINIO_ENABLED:false}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    bucket: ${MINIO_BUCKET:insightflow}
  rabbitmq:
    enabled: ${INFRA_RABBITMQ_ENABLED:false}
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}

insightflow:
  workflow:
    internal-evidence-threshold: ${INSIGHTFLOW_INTERNAL_EVIDENCE_THRESHOLD:2}
    min-claim-count: ${INSIGHTFLOW_MIN_CLAIM_COUNT:2}
    verify-pass-confidence: ${INSIGHTFLOW_VERIFY_PASS_CONFIDENCE:0.70}
    review-pass-citation-coverage: ${INSIGHTFLOW_REVIEW_PASS_CITATION_COVERAGE:0.80}
    max-loops: ${INSIGHTFLOW_MAX_LOOPS:2}

management:
  endpoints:
    web:
      exposure:
        include: health,info
