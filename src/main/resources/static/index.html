<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#eef2f6">
  <title>InsightFlow 研究控制台</title>
  <link rel="stylesheet" href="/styles.css?v=20260707-zh3">
  <script defer src="https://unpkg.com/lucide@latest"></script>
  <script defer src="/app.js?v=20260707-zh3"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">IF</div>
        <div>
          <div class="brand-name">InsightFlow</div>
          <div class="brand-subtitle">研究控制台</div>
        </div>
      </div>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>新建任务</h2>
            <p>创建研究流程</p>
          </div>
        </div>

        <label class="field">
          <span>研究问题</span>
          <textarea id="task-query" rows="5" placeholder="请输入研究问题，例如：请分析比亚迪、特斯拉与理想汽车在中国新能源车市场的竞争格局"></textarea>
        </label>

        <div class="inline-grid">
          <label class="field">
            <span>语言</span>
            <select id="task-language">
              <option value="zh-CN">zh-CN</option>
              <option value="en-US">en-US</option>
            </select>
          </label>
          <div class="field">
            <span>示例</span>
            <div class="preset-row" id="query-presets"></div>
          </div>
        </div>

        <div class="action-row">
          <button class="btn btn-primary" id="create-task-btn">
            <i data-lucide="square-pen"></i>
            创建
          </button>
          <button class="btn" id="run-current-btn">
            <i data-lucide="play"></i>
            运行
          </button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>文档</h2>
            <p>上传并索引知识</p>
          </div>
        </div>

        <div class="dropzone" id="document-dropzone">
          <input
            id="document-file"
            type="file"
            accept=".txt,.md,.json,.csv,.log,text/plain,text/markdown,application/json,text/csv"
            hidden
          >
          <div class="dropzone-copy">
            <strong>拖放文件到这里</strong>
            <span>或选择 UTF-8 文本文件进行索引</span>
          </div>
          <div class="dropzone-actions">
            <button class="btn btn-ghost" id="choose-file-btn">
              <i data-lucide="paperclip"></i>
              选择文件
            </button>
            <button class="btn btn-primary" id="upload-document-btn">
              <i data-lucide="upload"></i>
              上传
            </button>
          </div>
        </div>

        <div class="action-row compact">
          <button class="btn" id="index-document-btn">
            <i data-lucide="folder-up"></i>
            索引选中文档
          </button>
        </div>

        <div class="list-head">
          <span>最近文档</span>
          <button class="link-btn" id="refresh-documents-btn">刷新</button>
        </div>
        <div class="stack-list" id="document-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>任务</h2>
            <p>最近研究任务与执行记录</p>
          </div>
        </div>
        <div class="list-head">
          <span>任务队列</span>
          <button class="link-btn" id="refresh-tasks-btn">刷新</button>
        </div>
        <div class="stack-list" id="task-list"></div>
      </section>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="title-group">
          <p class="eyebrow">InsightFlow</p>
          <h1 id="current-task-title">研究控制台</h1>
          <p id="current-task-subtitle">创建任务，启动图执行，并实时查看过程。</p>
        </div>

        <div class="topbar-actions">
          <label class="toggle">
            <input type="checkbox" id="stream-toggle" checked>
            <span class="toggle-ui"></span>
            <span class="toggle-text">实时</span>
          </label>
          <button class="btn btn-ghost" id="refresh-current-btn">
            <i data-lucide="refresh-cw"></i>
            刷新
          </button>
          <button class="btn btn-primary" id="run-selected-btn">
            <i data-lucide="play-circle"></i>
            运行当前任务
          </button>
        </div>
      </header>

      <section class="status-strip" id="status-strip">
        <div class="status-item">
          <span>状态</span>
          <strong id="status-value">待机</strong>
        </div>
        <div class="status-item">
          <span>证据</span>
          <strong id="evidence-value">0</strong>
        </div>
        <div class="status-item">
          <span>检查点</span>
          <strong id="checkpoint-value">0</strong>
        </div>
        <div class="status-item">
          <span>评测</span>
          <strong id="evaluation-value">--</strong>
        </div>
      </section>

      <section class="surface">
        <div class="surface-head">
          <div>
            <h2>执行地图</h2>
            <p>流程阶段、状态摘要与实时指标</p>
          </div>
          <div class="mini-chips" id="current-chips"></div>
        </div>
        <div id="workflow-rail" class="workflow-rail"></div>
      </section>

      <section class="surface">
        <div class="tabbar" id="tabbar">
          <button class="tab-btn active" data-tab="overview">
            <i data-lucide="layout-dashboard"></i>
            总览
          </button>
          <button class="tab-btn" data-tab="timeline">
            <i data-lucide="activity"></i>
            时间线
          </button>
          <button class="tab-btn" data-tab="report">
            <i data-lucide="file-text"></i>
            报告
          </button>
          <button class="tab-btn" data-tab="checkpoints">
            <i data-lucide="database"></i>
            检查点
          </button>
          <button class="tab-btn" data-tab="evaluation">
            <i data-lucide="bar-chart-3"></i>
            评测
          </button>
        </div>

        <div class="tab-panel active" id="tab-overview"></div>
        <div class="tab-panel" id="tab-timeline"></div>
        <div class="tab-panel" id="tab-report"></div>
        <div class="tab-panel" id="tab-checkpoints"></div>
        <div class="tab-panel" id="tab-evaluation"></div>
      </section>
    </main>

    <aside class="inspector">
      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>实时流</h2>
            <p>进度事件与工具调用</p>
          </div>
          <span class="pill" id="stream-status">未连接</span>
        </div>
        <div class="feed" id="live-feed"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>恢复</h2>
            <p>恢复、重跑与状态补丁</p>
          </div>
        </div>

        <label class="field">
          <span>检查点</span>
          <select id="resume-checkpoint"></select>
        </label>

        <div class="inline-grid">
          <label class="field">
            <span>重跑节点</span>
            <select id="rerun-node"></select>
          </label>
          <label class="field">
            <span>节点前</span>
            <select id="before-node"></select>
          </label>
        </div>

        <label class="field">
          <span>状态补丁</span>
          <textarea id="state-patch" rows="8" spellcheck="false"></textarea>
        </label>

        <div class="action-row compact">
          <button class="btn btn-primary" id="resume-btn">
            <i data-lucide="corner-up-right"></i>
            恢复
          </button>
          <button class="btn" id="rerun-btn">
            <i data-lucide="rotate-cw"></i>
            重跑
          </button>
          <button class="btn btn-ghost" id="preview-before-btn">
            <i data-lucide="scan-search"></i>
            预览
          </button>
        </div>

        <div class="preview-box" id="recovery-preview">
          <div class="preview-empty">选择一个检查点或节点即可查看快照。</div>
        </div>

        <div class="action-row compact">
          <button class="btn btn-ghost" id="evaluate-btn">
            <i data-lucide="badge-check"></i>
            评测
          </button>
        </div>
      </section>
    </aside>
  </div>

  <div class="toast-host" id="toast-host"></div>
</body>
</html>
